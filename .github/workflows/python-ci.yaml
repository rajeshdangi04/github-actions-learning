name: Artifact Demo

on:
  push:

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create File
        run: echo "Hello Rajesh" > message.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-file
          path: message.txt

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: my-file

      - name: Show File
        run: cat message.txt